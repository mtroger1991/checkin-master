name: Daily Checkin

on:
  schedule:
    # UTC 23:00 = 北京时间 7:00
    - cron: '0 23 * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create config
      run: |
        echo "${{ secrets.CHECKIN_CONFIG }}" > config/config.json
    
    - name: Run checkin
      run: |
        python main.py
    
    - name: Clean up
      if: always()
      run: |
        rm -f config/config.json